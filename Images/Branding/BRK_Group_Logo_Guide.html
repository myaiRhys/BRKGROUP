
<!DOCTYPE html>

    <meta charset="UTF-8">
    <title>BRK Group Logo Design Sheet</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@900&display=swap');
        body {
            margin: 0;
            padding: 60px;
            font-family: 'Barlow Condensed', sans-serif;
            background-color: #f0ebe2;
        }
        .header { margin-bottom: 50px; text-align: center; border-bottom: 2px solid #0e0d0b; padding-bottom: 20px; }
        h1 { font-weight: 900; text-transform: uppercase; margin: 0; font-size: 3rem; color: #0e0d0b; }
        
        .section {
            margin-bottom: 40px;
            padding: 50px;
            border-radius: 4px;
        }
        .dark-bg { background-color: #0e0d0b; }
        .light-bg { background-color: #f0ebe2; }
        .orange-bg { background-color: #e8622a; }
        
        .section-title {
            font-size: 14px;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 40px;
            border-left: 5px solid #e8622a;
            padding-left: 15px;
        }
        .dark-bg .section-title { color: #f0ebe2; }
        .light-bg .section-title { color: #0e0d0b; }
        .orange-bg .section-title { color: #0e0d0b; border-left-color: #0e0d0b; }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            align-items: center;
        }
        .logo-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .label {
            font-size: 10px;
            letter-spacing: 1px;
            margin-top: 20px;
            opacity: 0.6;
            text-transform: uppercase;
        }
        .dark-bg .label { color: #f0ebe2; }
        .light-bg .label { color: #0e0d0b; }
        .orange-bg .label { color: #0e0d0b; }
    </style>
</head>

                <text x="85" y="52" style="font-family:'Barlow Condensed', sans-serif; font-weight:900; text-transform:uppercase; font-size:62px;" fill="#f0ebe2">BRK</text>
